<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640">
  <defs>
    <radialGradient id="bodyg" cx="0.35" cy="0.25" r="1">
      <stop offset="0" stop-color="#463a6b"/>
      <stop offset="0.45" stop-color="#221c3a"/>
      <stop offset="1" stop-color="#0d0b16"/>
    </radialGradient>
    <radialGradient id="headg" cx="0.35" cy="0.3" r="1">
      <stop offset="0" stop-color="#52428a"/>
      <stop offset="1" stop-color="#171227"/>
    </radialGradient>
    <linearGradient id="legg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b2f63"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="floor" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eyeglow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- glowing floor + hex hints -->
  <ellipse cx="320" cy="540" rx="280" ry="70" fill="url(#floor)"/>
  <g stroke="#8b5cf6" stroke-opacity="0.18" fill="none" stroke-width="2">
    <path d="M 160 540 l 22 -13 22 13 0 26 -22 13 -22 -13 z"/>
    <path d="M 250 560 l 22 -13 22 13 0 26 -22 13 -22 -13 z"/>
    <path d="M 360 548 l 22 -13 22 13 0 26 -22 13 -22 -13 z"/>
    <path d="M 452 566 l 22 -13 22 13 0 26 -22 13 -22 -13 z"/>
    <path d="M 92 576 l 22 -13 22 13 0 26 -22 13 -22 -13 z"/>
  </g>

  <g filter="url(#glow)">
    <!-- legs -->
    <g stroke="url(#legg)" stroke-width="17" stroke-linecap="round" fill="none">
      <path d="M 364 262 C 430 200 466 184 512 108"/>
      <path d="M 374 300 C 452 272 500 266 572 234"/>
      <path d="M 374 338 C 452 350 506 376 570 424"/>
      <path d="M 362 372 C 418 420 452 470 494 556"/>
      <path d="M 276 262 C 210 200 174 184 128 108"/>
      <path d="M 266 300 C 188 272 140 266 68 234"/>
      <path d="M 266 338 C 188 350 134 376 70 424"/>
      <path d="M 278 372 C 222 420 188 470 146 556"/>
    </g>
    <!-- leg joints -->
    <g fill="#8b5cf6" fill-opacity="0.9">
      <circle cx="446" cy="196" r="7"/><circle cx="194" cy="196" r="7"/>
      <circle cx="482" cy="268" r="7"/><circle cx="158" cy="268" r="7"/>
      <circle cx="488" cy="366" r="7"/><circle cx="152" cy="366" r="7"/>
      <circle cx="446" cy="452" r="7"/><circle cx="194" cy="452" r="7"/>
    </g>
    <!-- abdomen -->
    <ellipse cx="320" cy="420" rx="96" ry="116" fill="url(#bodyg)" stroke="#8b5cf6" stroke-opacity="0.65" stroke-width="3"/>
    <!-- abdomen markings -->
    <path d="M 320 330 C 344 360 344 400 320 440 C 296 400 296 360 320 330 z" fill="#8b5cf6" fill-opacity="0.30"/>
    <circle cx="320" cy="470" r="10" fill="#8b5cf6" fill-opacity="0.5"/>
    <!-- cephalothorax -->
    <ellipse cx="320" cy="284" rx="58" ry="62" fill="url(#headg)" stroke="#8b5cf6" stroke-opacity="0.65" stroke-width="3"/>
    <!-- fangs -->
    <path d="M 302 236 C 296 218 300 206 310 196" stroke="#6d28d9" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M 338 236 C 344 218 340 206 330 196" stroke="#6d28d9" stroke-width="10" stroke-linecap="round" fill="none"/>
  </g>

  <!-- eyes -->
  <g filter="url(#eyeglow)">
    <circle cx="300" cy="264" r="10" fill="#c4b5fd"/>
    <circle cx="340" cy="264" r="10" fill="#c4b5fd"/>
    <circle cx="284" cy="282" r="5" fill="#a78bfa"/>
    <circle cx="356" cy="282" r="5" fill="#a78bfa"/>
  </g>
  <!-- specular highlight -->
  <ellipse cx="288" cy="368" rx="30" ry="44" fill="#ffffff" fill-opacity="0.06"/>
</svg>
